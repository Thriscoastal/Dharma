<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manomitra Chatbot</title>
    <link rel="stylesheet" href="manomitra-style.css">
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h1>Manomitra</h1>
            <p class="subtitle">A calm companion for your mind</p>
        </div>
        
        <div class="chat-area" id="chatArea">
            <!-- Chat bubbles will appear here -->
        </div>
        
        <div class="quick-chips">
            <button class="chip" data-message="I feel sad">I feel sad</button>
            <button class="chip" data-message="I am anxious">I am anxious</button>
            <button class="chip" data-message="I need motivation">I need motivation</button>
            <button class="chip" data-message="I feel lonely">I feel lonely</button>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type your message...">
            <button id="sendButton">Send</button>
        </div>
        
        <p class="disclaimer">Manomitra offers emotional support, not medical diagnosis.</p>
    </div>

    <script src="manomitra-script.js"></script>
</body>
</html>
